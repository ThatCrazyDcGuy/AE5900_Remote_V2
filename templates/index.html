<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AE-5900 Remote Pro</title>
    <style>
        body { background: #1a1a1a; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 15px; touch-action: manipulation; }
        .display { border: 2px solid #333; background: #000; margin: 10px auto; width: 95%; max-width: 400px; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px #00ff0033; }
        .freq { font-size: 3.5em; font-weight: bold; margin: 5px 0; }
        .mhz { font-size: 1.1em; color: #008800; margin-bottom: 10px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 95%; max-width: 400px; margin: 20px auto; }
        button { background: #333; color: white; border: none; padding: 15px; font-size: 1.1em; border-radius: 5px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .btn-ptt { grid-column: span 2; background: #4a0000; font-weight: bold; min-height: 80px; transition: 0.2s; }
        .btn-ptt.active { background: #ff0000; box-shadow: 0 0 20px red; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 200px; margin: 15px auto; }
        .num-btn { background: #222; color: #0f0; padding: 12px; border: 1px solid #444; }
        .setup-area { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; color: #888; text-align: left; max-width: 400px; margin: 0 auto; }
        .hold-button { position: relative; width: 100%; height: 50px; background: #444; color: white; border: none; overflow: hidden; margin: 10px 0; border-radius: 5px; }
        .progress-bar { position: absolute; bottom: 0; left: 0; height: 5px; background: #00ff00; width: 0%; transition: width 0.1s linear; }
    </style>
</head>
<body>
    <div class="display" style="position: relative; overflow: hidden;">
        <!-- Das Canvas für das Spectrum/Wasserfall -->
        <canvas id="audioVisualizer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.3; pointer-events: none;"></canvas>
    
        <div id="pttStat" style="font-weight:bold; color:#444; position: relative; z-index: 2;">○ RX IDLE</div>
        <div class="freq" id="chDisp" style="position: relative; z-index: 2;">01</div>
        <div class="mhz" id="mhzDisp" style="position: relative; z-index: 2;">26.965 MHz</div>
        <div id="modeName" style="font-size: 1.2em; color: #888; position: relative; z-index: 2;">FM</div>
    </div>

    <div class="keypad">
        {% for i in range(1, 10) %}<button class="num-btn" onclick="send('K{{i}}')">{{i}}</button>{% endfor %}
        <button class="num-btn" style="grid-column: span 3" onclick="send('K0')">0</button>
    </div>

    <div class="controls">
        <button onclick="send('U')">▲ CH UP</button>
        <button onclick="send('D')">▼ CH DOWN</button>
        <button onclick="send('M')" style="grid-column: span 2;">MODE</button>
        <button onclick="send('P1')" id="lbl-p1">P1 ({{config.p1_label}})</button>
        <button onclick="send('P2')" id="lbl-p2">P2 ({{config.p2_label}})</button>
        <button onclick="send('P3')" id="lbl-p3">P3 ({{config.p3_label}})</button>
        <button onclick="send('P4')" id="lbl-p4">P4 ({{config.p4_label}})</button>
        <button onclick="send('P')" id="pttBtn" class="btn-ptt">PTT TOGGLE</button>
    </div>

    <details class="setup-area">
        <summary>⚙️ SETUP & SYNC</summary>
        <div style="background: #222; padding: 20px; border-radius: 10px;">
            <button id="syncBtn" class="hold-button"><span style="position:relative; z-index:2;">SUPER SYNC (CH 01 - Hold 3s)</span><div class="progress-bar" id="syncProgress"></div></button>
            <p>PTT Timeout: <input type="number" id="pttInput" value="{{ config.ptt_timeout }}" style="width: 60px;" onchange="updateTimeout()"> s</p>
            <p>Skip PA: <input type="checkbox" onchange="fetch('/api/cmd/SET_SKIP_PA?val=' + this.checked)" {% if config.skip_pa %}checked{% endif %}></p>
            <p>P1 Label: <input type="text" value="{{config.p1_label}}" onchange="setCfg('P1', this.value)" style="width:100px;"></p>
            <p>P2 Label: <input type="text" value="{{config.p2_label}}" onchange="setCfg('P2', this.value)" style="width:100px;"></p>
            <p>P3 Label: <input type="text" value="{{config.p3_label}}" onchange="setCfg('P3', this.value)" style="width:100px;"></p>
            <p>P4 Label: <input type="text" value="{{config.p4_label}}" onchange="setCfg('P4', this.value)" style="width:100px;"></p>
        </div>
    </details>

    <script>
        const freqs = {"01":"26.965","02":"26.975","03":"26.985","04":"27.005","05":"27.015","06":"27.025","07":"27.035","08":"27.055","09":"27.065","10":"27.075","11":"27.085","12":"27.105","13":"27.115","14":"27.125","15":"27.135","16":"27.155","17":"27.165","18":"27.175","19":"27.185","20":"27.205","21":"27.215","22":"27.225","23":"27.255","24":"27.235","25":"27.245","26":"27.265","27":"27.275","28":"27.285","29":"27.295","30":"27.305","31":"27.315","32":"27.325","33":"27.335","34":"27.345","35":"27.355","36":"27.365","37":"27.375","38":"27.385","39":"27.395","40":"27.405"};
        
const canvas = document.getElementById('audioVisualizer');
const ctx = canvas.getContext('2d');

// WICHTIG: Auflösung setzen
canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

let lastData = new Array(32).fill(0);

function drawSpectrum() {
    fetch('/api/audio')
        .then(r => r.json())
        .then(data => {
            if (!Array.isArray(data)) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const barWidth = canvas.width / data.length;
            
            data.forEach((val, i) => {
                // Fall-Dämpfung etwas verringert für flüssigere Optik
                let displayVal = Math.max(val, lastData[i] - 1.5);
                lastData[i] = displayVal;

                // Hier den Teiler anpassen (40 ist empfindlicher als 80)
                let height = (displayVal / 40) * canvas.height; 
                
                // Sicherheit: Höhe begrenzen
                if(height > canvas.height) height = canvas.height;

                let grad = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - height);
                grad.addColorStop(0, '#004400');
                grad.addColorStop(1, '#00ff00');
                
                ctx.fillStyle = grad;
                // Zeichne von unten nach oben
                ctx.fillRect(i * barWidth, canvas.height - height, barWidth - 1, height);
            });
            
            setTimeout(drawSpectrum, 50);
        })
        .catch(e => {
            console.error("Audio API Fehler:", e);
            setTimeout(drawSpectrum, 1000);
        });
}

// Fenster-Resize abfangen, damit das Canvas mitwächst
window.onresize = () => {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
};

drawSpectrum();


        function updateUI(data) {
            if(!data) return;
            const ch = data.CH;
            document.getElementById('chDisp').innerText = ch;
            document.getElementById('mhzDisp').innerText = (freqs[ch] || "---.---") + " MHz";
            document.getElementById('modeName').innerText = data.MODE;
            
            const btn = document.getElementById('pttBtn');
            const stat = document.getElementById('pttStat');
            
            if(data.PTT === "ON") {
                btn.classList.add('active'); btn.innerText = "TX ACTIVE (" + data.REMAINING + "s)";
                stat.innerText = "● TRANSMIT"; stat.style.color = "red";
            } else if(data.BUSY) {
                btn.classList.remove('active'); btn.innerText = "PTT TOGGLE";
                stat.innerText = "⚡ SIGNAL DETECTED"; stat.style.color = "#00ff00";
            } else {
                btn.classList.remove('active'); btn.innerText = "PTT TOGGLE";
                stat.innerText = "○ RX IDLE"; stat.style.color = "#444";
            }
        }

        // NEU: Die intelligente Abfrage-Schleife
        function pollStatus() {
            fetch('/api/cmd/STATUS')
                .then(r => r.json())
                .then(data => {
                    updateUI(data);
                    // Warte 1 Sekunde NACHDEM die Antwort da war
                    setTimeout(pollStatus, 1000); 
                })
                .catch(e => {
                    console.error("Poll Fehler:", e);
                    // Bei Netzwerkfehler etwas länger warten (2 Sek)
                    setTimeout(pollStatus, 2000);
                });
        }

        function send(cmd) { fetch('/api/cmd/' + cmd).then(r => r.json()).then(updateUI); }
        function setCfg(p, val) { fetch('/api/cmd/SET_' + p + '_LABEL?val=' + encodeURIComponent(val)); document.getElementById('lbl-' + p.toLowerCase()).innerText = p + " (" + val + ")"; }
        function updateTimeout() { fetch('/api/cmd/T' + document.getElementById('pttInput').value); }

        let hT, prg = 0;
        const sB = document.getElementById('syncBtn');
        function startS() { prg = 0; hT = setInterval(() => { prg += 4; document.getElementById('syncProgress').style.width = prg + "%"; if(prg >= 100) { clearInterval(hT); send('S'); document.getElementById('syncProgress').style.width = "0%"; } }, 100); }
        function stopS() { clearInterval(hT); document.getElementById('syncProgress').style.width = "0%"; }
        sB.onmousedown = sB.ontouchstart = (e) => { if(e.type==='touchstart') e.preventDefault(); startS(); };
        sB.onmouseup = sB.onmouseleave = sB.ontouchend = stopS;

        // START: Anstelle von setInterval jetzt der einmalige Aufruf
        pollStatus();
    </script>
</body>
</html>
